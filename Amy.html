<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Magie des Choix ✨</title>
    <style>
        :root {
            --pink-soft: #fce4ec;
            --pink-dark: #ad1457;
            --purple-magic: #7b1fa2;
            --gold: #ffd700;
        }

        body {
            font-family: 'Segoe UI', cursive, sans-serif;
            background: linear-gradient(135deg, #fdf0f5 0%, #e1bee7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 2rem;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(173, 20, 87, 0.2);
            text-align: center;
            width: 90%;
            max-width: 450px;
            border: 6px solid #f8bbd0;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: white;
            padding: 10px 20px;
            border-radius: 25px;
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--pink-dark);
            border: 2px solid #fce4ec;
        }

        #question {
            font-size: 2.8rem;
            color: var(--purple-magic);
            margin: 20px 0;
            text-shadow: 2px 2px 0px #f8bbd0;
        }

        /* --- Grille de Choix --- */
        #options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            background: white;
            border: 3px solid #f06292;
            color: #ad1457;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0px #f06292;
        }

        .option-btn:hover {
            transform: translateY(-2px);
            background: #fce4ec;
        }

        .option-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        /* --- Couleurs des niveaux --- */
        select {
            padding: 8px;
            border-radius: 15px;
            border: 2px solid #f48fb1;
            margin-bottom: 10px;
            outline: none;
        }

        #feedback {
            margin-top: 20px;
            height: 30px;
            font-weight: bold;
        }

        .star {
            position: absolute;
            pointer-events: none;
            animation: fly 0.8s ease-out forwards;
        }

        @keyframes fly {
            to { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats-bar">
        <span>💎 <span id="total-score">0</span></span>
        <select id="difficulty" onchange="generateQuestion()">
            <option value="easy">🌸 Facile</option>
            <option value="medium">⭐ Moyen</option>
            <option value="hard">🔥 Difficile</option>
            <option value="magic">✨ Inconnue X</option>
        </select>
    </div>

    <div id="question">?</div>
    
    <div id="options-grid">
        </div>

    <div id="feedback"></div>
</div>

<script>
    let score = parseInt(localStorage.getItem('magicScore')) || 0;
    let correctAnswer = 0;
    let startTime = 0;

    document.getElementById('total-score').textContent = score;

    function generateQuestion() {
        const diff = document.getElementById('difficulty').value;
        const qEl = document.getElementById('question');
        let n1, n2, op;
        startTime = Date.now();

        if (diff === 'easy') {
            n1 = rand(1, 15); n2 = rand(1, 15);
            op = '+'; correctAnswer = n1 + n2;
            qEl.textContent = `${n1} + ${n2}`;
        } else if (diff === 'medium') {
            n1 = rand(2, 10); n2 = rand(2, 10);
            op = '×'; correctAnswer = n1 * n2;
            qEl.textContent = `${n1} × ${n2}`;
        } else if (diff === 'hard') {
            n1 = rand(10, 50); n2 = rand(10, 50);
            correctAnswer = n1 + n2;
            qEl.textContent = `${n1} + ${n2}`;
        } else {
            let x = rand(1, 12);
            let a = rand(1, 12);
            correctAnswer = x;
            qEl.textContent = `X + ${a} = ${x + a}`;
        }

        setupOptions(correctAnswer);
    }

    function setupOptions(correct) {
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        
        // Créer une liste de réponses (la bonne + 3 mauvaises)
        let choices = [correct];
        while (choices.length < 4) {
            let wrong = correct + rand(-5, 5);
            if (wrong >= 0 && !choices.includes(wrong)) {
                choices.push(wrong);
            }
        }

        // Mélanger les choix
        choices.sort(() => Math.random() - 0.5);

        choices.forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = val;
            btn.onclick = () => check(val);
            grid.appendChild(btn);
        });
    }

    function check(val) {
        const fb = document.getElementById('feedback');
        const diff = document.getElementById('difficulty').value;

        if (val === correctAnswer) {
            // Calcul Points : Base + Bonus vitesse (si < 3 sec)
            let base = {easy:10, medium:30, hard:50, magic:80}[diff];
            let bonus = (Date.now() - startTime) < 3000 ? Math.round(base/2) : 0;
            
            score += (base + bonus);
            localStorage.setItem('magicScore', score);
            document.getElementById('total-score').textContent = score;
            
            fb.innerHTML = `<span style="color:#43a047">Bravo ! +${base+bonus} ✨</span>`;
            createStars();
            setTimeout(generateQuestion, 1000);
        } else {
            fb.innerHTML = `<span style="color:#e53935">Essaie encore ! 🎀</span>`;
            setTimeout(() => fb.innerHTML = '', 1000);
        }
    }

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function createStars() {
        for (let i = 0; i < 10; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.textContent = ['⭐','✨','🌸','💎'][rand(0,3)];
            s.style.left = rand(10, 90) + '%';
            s.style.top = rand(20, 80) + '%';
            s.style.fontSize = rand(20, 40) + 'px';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 800);
        }
    }

    generateQuestion();
</script>

</body>
</html>
